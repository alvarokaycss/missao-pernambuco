<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="icon" href="../assets/img/favicon.png" type="image/png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="../assets/css/styles.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Mansalva&display=swap" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/animejs@3.2.1/lib/anime.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/js-confetti@latest/dist/js-confetti.browser.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module" src="../controllers/iniciar.js" defer></script>
    <script type="module" src="../controllers/perguntas.js" defer></script>
    <script type="module" src="../controllers/utils.js" defer></script>
    <script type="module" src="../controllers/confetes.js" defer></script>

    <title>Missão Pernambuco</title>
</head>

<body id="body" class="bg-pe">

    <!--Filtro de noite-->
    <div id="noite" class="escurecendo"></div>

    <!--Feedback de acerto ou erro-->
    <div class="col-12 alternativa ">
        <img id="feedback" class="d-none img-fluid w-50 mx-auto d-block"
            src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///ywAAAAAAQABAAACAUwAOw==" alt="feedback">
    </div>


    <main class="container d-flex flex-column justify-content-center align-items-center min-vh-100">

        <!--Tela de Introdução-->
        <section id="card-pe" class="tela ativa card-pe text-center d-flex flex-column align-items-center gap-3">
            <img id="missao-gif" class="rounded-5" src="../assets/img/missao_pernambuco.gif" alt="Missão Pernambuco">
            <a id="btn-iniciar" class="btn btn-pe w-50 py-2">Iniciar</a>
            <div id="barra-progresso" class="progress w-75 mt-3 d-none" role="progressbar"
                aria-label="Default striped example" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"
                style="height: 30px;">
                <div id="progresso-fill" class="progress-bar progress-bar-striped progress-bar-animated bg-warning"
                    style="width: 0%; background-color: #e28e43 !important">0%</div>
            </div>
        </section>

        <section id="card-selecao" class="tela d-flex flex-column align-items-center gap-3">
            <h1 class="fs-1 fs-md-2 fs-lg-3 text-center text-game">Selecione uma cidade para iniciar a missão!</h1>
            <div id="map"></div>
            <button type="button" id="btn-iniciar-missao" class="btn btn-pe w-75 py-2 d-none">Iniciar Missão</button>
        </section>


        <!--Tela de Quiz-->
        <section id="card-quiz" class="tela d-flex flex-column align-items-center gap-3">

            <div class="container">
                <div class="row align-items-center py-5">
                    <div class="col-7 col-lg-4">
                        <div class="d-flex">
                            <img id="vida-1" class="img-fluid w-50" src="../assets/img/sol.gif" alt="sol">
                            <img id="vida-2" class="img-fluid w-50 m-negativo" src="../assets/img/sol.gif" alt="sol">
                            <img id="vida-3" class="img-fluid w-50 m-negativo" src="../assets/img/sol.gif" alt="sol">
                            <img id="vida-4" class="img-fluid w-50 m-negativo" src="../assets/img/sol.gif" alt="sol">
                            <img id="vida-5" class="img-fluid w-50 m-negativo" src="../assets/img/sol.gif" alt="sol">
                        </div>
                    </div>

                    <div class="col-5 col-lg-8">
                        <div id="barra-tempo" class="progress" role="progressbar" aria-label="Success example"
                            aria-valuenow="25" aria-valuemin="0" aria-valuemax="100">
                            <div id="barra-tempo-fill" class="progress-bar bg-success"
                                style="width: 100%; background-color: #e28e43 !important; font-size: 1rem;">0s</div>
                        </div>
                    </div>

                </div>

                <div class="row justify-content-between align-items-center">
                    <div class="col-12 text-end">
                        <p id="pergunta-feedback" class="text-game fs-4 fs-md-3 fs-lg-2">Pergunta 1/10</p>
                    </div>
                </div>
            </div>

            <div class="container vh-75 d-flex flex-column justify-content-around">

                <div class="row justify-content-center text-center">
                    <div class="col">
                        <h2 id="pergunta" class="text-game fs-1 fs-md-2 fs-lg-3">
                            Qual evento cultural de destaque ocorre anualmente em Garanhuns no mês de julho?
                        </h2>
                    </div>
                </div>

                <div class="row justify-content-center mt-4">
                    <div class="col-12 col-md-6">

                        <div class="d-flex gap-2 mb-2">
                            <button type="button" class="btn btn-red w-50 py-2 opcao">Festival de Inverno</button>
                            <button type="button" class="btn btn-amarelo w-50 py-2 opcao">Garanhuns Jazz
                                Festival</button>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="button" class="btn btn-verde w-50 py-2 opcao">Magia do Natal</button>
                            <button type="button" class="btn btn-azul w-50 py-2 opcao">Festa do Leite</button>
                        </div>

                    </div>
                </div>

            </div>
        </section>


        <!--Tela de Derrota-->
        <section id="card-perdeu" class="tela d-flex flex-column align-items-center">
            <img id="img-tela-perdeu" class="img-fluid rounded-4"
                src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///ywAAAAAAQABAAACAUwAOw=="
                alt="Missão Falhou, Perdesse Abestado!">
            <button type="button" id="btn-tentar-novamente" class="btn btn-pe w-50 py-2 d-none">Tentar
                Novamente</button>
        </section>


        <!--Tela de Vitória-->
        <section id="card-vitoria" class="tela card-pe text-center">
            <div class="container ">
                <div class="row justify-content-around">
                    <div class="col-12 mb-5">
                        <h1 class="text-game fs-1 fs-md-2 fs-lg-3">Parabéns! Você completou a missão!</h1>
                    </div>
                    <div class="col-8 mt-5">
                        <button type="button" id="btn-jogar-novamente" class="btn btn-pe w-75 py-2 d-none">Jogar
                            Novamente</button>
                    </div>
                </div>
            </div>
        </section>

    </main>


    <!--Audio principal-->
    <audio id="bg-audio" class="audio" loop>
        <source src="../assets/audio/missao-music.mp3" type="audio/mpeg">
    </audio>


    <!--Audios das cidades personalizadas-->
    <audio id="bg-audio-Recife" class="audio" loop>
        <source src="../assets/audio/Recife.mp3" type="audio/mpeg">
    </audio>
    <audio id="bg-audio-Olinda" class="audio" loop>
        <source src="../assets/audio/Olinda.mp3" type="audio/mpeg">
    </audio>
    <audio id="bg-audio-Caruaru" class="audio" loop>
        <source src="../assets/audio/Caruaru.mp3" type="audio/mpeg">
    </audio>


    <!-- Audios de Feedback -->
    <audio id="som-acerto" src="../assets/audio/correctsound.mp3"></audio>
    <audio id="som-erro" src="../assets/audio/incorrectsound.mp3"></audio>
    <audio id="som-vitoria" src="../assets/audio/victory.mp3"></audio>
    <audio id="som-derrota" src="../assets/audio/gameover.mp3"></audio>

</body>

</html>
